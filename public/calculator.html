<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk-Adjusted Margin Calculator</title>
    <script>
        async function calculateMargin() {
            const margin = document.getElementById("margin").value;
            const riskFactor = document.getElementById("riskFactor").value;
            const response = await fetch('https://api.example.com/calculate-margin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ margin, riskFactor }),
            });
            const result = await response.json();
            document.getElementById("result").innerText = "Calculated Risk-Adjusted Margin: " + result.margin;
        }
    </script>
</head>
<body>
    <h1>Risk-Adjusted Margin Calculator</h1>
    <form onsubmit="event.preventDefault(); calculateMargin();">
        <label for="margin">Margin:</label>
        <input type="number" id="margin" required>
        <br>
        <label for="riskFactor">Risk Factor:</label>
        <input type="number" id="riskFactor" required>
        <br>
        <button type="submit">Calculate</button>
    </form>
    <h2 id="result"></h2>
</body>
</html>
